name: Migrate production database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type migrate-production to confirm
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-database-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply committed migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    env:
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}

    steps:
      - name: Confirm migration request
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [[ "$CONFIRMATION" != "migrate-production" ]]; then
            echo "::error::Enter migrate-production to run this workflow."
            exit 1
          fi

      - name: Validate migration secret
        run: |
          if [[ -z "$MIGRATION_DATABASE_URL" ]]; then
            echo "::error::MIGRATION_DATABASE_URL is not configured in the production environment."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply committed migrations
        run: pnpm db:migrate
