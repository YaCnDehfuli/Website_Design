services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: personal_website
      POSTGRES_PASSWORD: local_password
      POSTGRES_USER: personal_website
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_website -d personal_website"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
